<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pb_emu — Pixelblaze Emulator</title>
    <link rel="stylesheet" href="/src/app/style.css" />
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div id="hud">
      <div id="stats">
        <span id="counts">0 LEDs · —</span>
      </div>
      <div id="hud-actions">
        <button id="playpause" type="button" title="Space">Pause</button>
        <button id="step" type="button" title="." disabled>Step</button>
        <button id="reload" type="button" title="R" disabled>Reload</button>
        <label id="autoReloadLbl" title="Auto-reload when the pattern or map file changes (Path/URL loads only)"><input type="checkbox" id="autoReload" /> Auto</label>
        <button id="screenshot" type="button">Shot</button>
        <button id="toggleLoader" type="button" title="L">Load…</button>
        <button id="help" type="button" title="?">?</button>
      </div>
      <select id="recents" title="Recent patterns">
        <option value="">Recents…</option>
      </select>
      <label id="speedCtl" title="Simulation speed">
        <span>Speed</span>
        <input type="range" id="speed" min="0.1" max="4" step="0.05" value="1" />
        <span id="speedVal">1.00×</span>
      </label>
      <div id="viewPresets">
        <button data-view="front">Front</button>
        <button data-view="top">Top</button>
        <button data-view="side">Side</button>
        <button data-view="iso">Iso</button>
      </div>
    </div>
    <div id="controls" class="hidden"></div>
    <canvas id="paletteStrip" width="256" height="14" class="hidden"></canvas>
    <div id="inspector" class="hidden"></div>
    <div id="loader" class="hidden">
      <h3>Pattern</h3>
      <div class="tabs" data-group="pattern">
        <button data-tab="file" class="active">File</button>
        <button data-tab="paste">Paste</button>
        <button data-tab="url">URL</button>
        <button data-tab="path">Path</button>
      </div>
      <div class="tabpanel" data-panel="pattern-file">
        <input type="file" id="patternFile" accept=".js,.epe,text/javascript,application/json" />
      </div>
      <div class="tabpanel hidden" data-panel="pattern-paste">
        <textarea id="patternPaste" placeholder="// paste Pixelblaze pattern JS"></textarea>
        <button id="patternPasteLoad">Load</button>
      </div>
      <div class="tabpanel hidden" data-panel="pattern-url">
        <input type="text" id="patternUrl" placeholder="https://raw.githubusercontent.com/…/pattern.js" />
        <button id="patternUrlLoad">Fetch</button>
      </div>
      <div class="tabpanel hidden" data-panel="pattern-path">
        <div id="patternBrowser" class="pbb-container"></div>
      </div>

      <h3>Pixel Map</h3>
      <div class="tabs" data-group="map">
        <button data-tab="file" class="active">File</button>
        <button data-tab="paste">Paste</button>
        <button data-tab="url">URL</button>
        <button data-tab="path">Path</button>
        <button data-tab="gen">Gen</button>
      </div>
      <div class="tabpanel" data-panel="map-file">
        <input type="file" id="mapFile" accept=".csv,.json,.js,text/*" />
      </div>
      <div class="tabpanel hidden" data-panel="map-paste">
        <textarea id="mapPaste" placeholder="CSV, JSON array, or JS function(pixelCount)"></textarea>
        <button id="mapPasteLoad">Load</button>
      </div>
      <div class="tabpanel hidden" data-panel="map-url">
        <input type="text" id="mapUrl" placeholder="URL to .csv / .json / .js" />
        <button id="mapUrlLoad">Fetch</button>
      </div>
      <div class="tabpanel hidden" data-panel="map-path">
        <div id="mapBrowser" class="pbb-container"></div>
      </div>
      <div class="tabpanel hidden" data-panel="map-gen">
        <select id="mapGenShape">
          <option value="1d">1D</option>
          <option value="2d" selected>2D</option>
          <option value="3d">3D</option>
        </select>
        <input type="number" id="mapGenW" min="1" max="256" value="16" title="Width / count" />
        <input type="number" id="mapGenH" min="1" max="256" value="16" title="Height" />
        <input type="number" id="mapGenD" min="1" max="64" value="8" title="Depth" />
        <button id="mapGenLoad">Generate</button>
      </div>

      <h3>Options</h3>
      <label><span>Normalize</span>
        <select id="normalizeMode">
          <option value="fill" selected>Fill (stretch)</option>
          <option value="contain">Contain (aspect-preserving)</option>
        </select>
      </label>
      <label><span>Force dim</span>
        <select id="forceDim">
          <option value="auto" selected>Auto</option>
          <option value="1">1D</option>
          <option value="2">2D</option>
          <option value="3">3D</option>
        </select>
      </label>
      <label><span>Swap Y/Z</span><input type="checkbox" id="swapYZ" /></label>
      <label><span>Bloom</span><input type="checkbox" id="bloomToggle" /></label>
      <label><span>LED size</span>
        <input type="range" id="ledSize" min="0.005" max="0.12" step="0.001" value="0.03" />
      </label>
      <label id="bloomStrengthLbl"><span>Bloom strength</span>
        <input type="range" id="bloomStrength" min="0" max="2" step="0.05" value="0.55" />
      </label>
      <label id="bloomRadiusLbl"><span>Bloom radius</span>
        <input type="range" id="bloomRadius" min="0" max="1" step="0.02" value="0.2" />
      </label>

      <div id="errors"></div>
    </div>
    <div id="warnings" class="hidden"></div>
    <div id="helpOverlay" class="hidden">
      <h3>Shortcuts</h3>
      <ul>
        <li><kbd>Space</kbd> play / pause</li>
        <li><kbd>.</kbd> single-frame step (while paused)</li>
        <li><kbd>R</kbd> reload current pattern</li>
        <li><kbd>L</kbd> toggle loader panel</li>
        <li><kbd>?</kbd> toggle this help</li>
      </ul>
      <p>Drop <code>.js</code> or <code>.epe</code> for a pattern, <code>.csv</code>/<code>.json</code> for a map.</p>
    </div>
    <div id="dropTarget" class="hidden">Drop to load</div>

    <script type="module" src="/src/app/main.js"></script>
  </body>
</html>
